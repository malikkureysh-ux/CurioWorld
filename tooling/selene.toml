# Selene-Konfiguration (Luau-Linter)
# https://kampfkarren.github.io/selene/lints/

std = "roblox"   # Roblox-spezifische Standard-Library
exclude = [
    "Packages/",     # Externe Libraries nicht linten
    "sourcemap.json", # Generated by Rojo
    "src/tests/",   # TestEZ specs — describe/it/expect kommen vom Framework
]

[rules]
# Etwas strenger als default für neue Projekte
shadowing = "warn"
unused_variable = "warn"
parenthese_conditions = "allow"
manual_table_clone = "allow"